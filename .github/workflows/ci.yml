name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # NOTE: job name preserved as "Test (core + cli)" to match the required
    # status check registered with branch protection. To rename safely,
    # update the branch-protection rule first (Settings → Branches → main).
    name: Test (core + cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The Tauri desktop crate (`revvault-tauri`) is excluded because it
      # requires libwebkit2gtk-4.1-dev + libgtk-3-dev and ships through a
      # separate release pipeline.
      - name: cargo test -p revvault-core -p revvault-cli --all-targets
        run: cargo test -p revvault-core -p revvault-cli --all-targets

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: cargo fmt --check --all
        run: cargo fmt --check --all

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Workspace clippy would pull in revvault-tauri whose deps need gtk;
      # mirror the test job's scope and lint core + cli only. Matches the
      # standard set in scripts/ci.sh + .claude/rules/rust.md ("Run cargo
      # clippy --workspace and cargo fmt --check before committing").
      - name: cargo clippy -p revvault-core -p revvault-cli -- -D warnings
        run: cargo clippy -p revvault-core -p revvault-cli --all-targets -- -D warnings

  frontend-build:
    name: pnpm build (tsc + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: pnpm build
        run: pnpm build
        working-directory: frontend

  frontend-test:
    name: pnpm test (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: pnpm test
        run: pnpm test
        working-directory: frontend

  shellcheck:
    name: ShellCheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: warning

  no-hardcoded-user:
    name: anti-regression — no hardcoded "joshu"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Grep for hardcoded "joshu" in scripted files
        run: |
          set -euo pipefail
          # Universal anti-regression guard mirrored from revkit#5 / forge#6
          # / revcon#2. revvault scripts/ + crates/cli touch developer
          # environments — a hardcoded user-account path would propagate
          # into operator workflows. Limited to scripted file types so this
          # workflow file (which has to mention the literal patterns to
          # scan for them) doesn't match itself.
          includes=(--include='*.sh' --include='*.ps1' --include='*.psm1' --include='*.psd1')
          hits=$(grep -rn 'joshu\b' "${includes[@]}" . || true)
          if [ -n "$hits" ]; then
            echo "::error::Hardcoded user-account name found in scripted files."
            echo "$hits"
            exit 1
          fi
          mnt_hits=$(grep -rn '/mnt/c/Users/joshu' "${includes[@]}" . || true)
          if [ -n "$mnt_hits" ]; then
            echo "::error::Hardcoded /mnt/c/Users path found in scripted files."
            echo "$mnt_hits"
            exit 1
          fi
          echo "ok — no hardcoded user paths in scripted files"

  gitleaks:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-cross-platform:
    # Cross-platform regression coverage. The primary `test` job above
    # stays ubuntu-only (and keeps the "Test (core + cli)" name) to match
    # the pre-existing branch-protection required check; this job adds
    # macOS and Windows legs without disturbing that.
    #
    # As of the memfd portability fix (closes #23), this job is REQUIRED.
    # The previous `continue-on-error: true` carve-out has been lifted.
    name: Test (core + cli) — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test -p revvault-core -p revvault-cli --all-targets
        run: cargo test -p revvault-core -p revvault-cli --all-targets

  msrv:
    # Verify revvault still builds on its declared minimum supported Rust
    # version. The MSRV is `rust-version = "1.88"` in the workspace
    # Cargo.toml — driven by `time`, `darling_macro`, and `instability`
    # transitive deps (ratatui-textarea claims 1.86 but our wider tree
    # pushes the floor to 1.88). Bump together when any dep raises the
    # floor; verify locally with `cargo +<msrv> build -p revvault-core
    # -p revvault-cli`.
    name: MSRV (rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo build -p revvault-core -p revvault-cli
        run: cargo build -p revvault-core -p revvault-cli

  audit:
    # cargo-audit hits the RustSec advisory database. revvault is an
    # age-encryption secret vault; shipping with a known CVE in any
    # transitive crate is unacceptable.
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  deny:
    # cargo-deny checks: license compliance (allow-list in deny.toml),
    # banned/duplicate deps, and source-registry/git allow-lists. Pairs
    # with cargo-audit for full supply-chain hygiene.
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny check

  doc:
    # cargo-doc with -D warnings catches broken intra-doc links and
    # missing doc items. Treats doc rot as a build error.
    name: cargo doc -D warnings
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo doc -p revvault-core -p revvault-cli --no-deps
        run: cargo doc -p revvault-core -p revvault-cli --no-deps

  pnpm-audit:
    # pnpm audit on the frontend deps. Equivalent of cargo-audit for the
    # Node.js side. REQUIRED as of the 2026-05-01 hardening marathon
    # punch-list item #1: the four vite/picomatch advisories that
    # originally pinned this to advisory mode were resolved by bumping
    # vite 6.4.1 → 8.x (transitively pulling picomatch 4.0.3 → 4.0.4).
    # Parent agent must add this job to required_status_checks
    # (13 → 14 contexts) post-merge.
    name: pnpm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: frontend
      - name: pnpm audit --audit-level=high
        run: pnpm audit --audit-level=high
        working-directory: frontend
